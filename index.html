<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whitelist Portal Bronx Roleplay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            min-height: 100vh;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center p-6 text-slate-200">

    <div class="w-full max-w-md glass p-8 rounded-3xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight text-white mb-2">Whitelist Portal</h1>
            <p class="text-slate-400 text-sm">Daftarkan karakter Anda untuk mulai bermain.</p>
            
            <div class="mt-6 p-3 bg-blue-600/10 border border-blue-500/30 rounded-xl inline-block w-full">
                <p class="text-xs uppercase tracking-widest text-blue-400 font-semibold mb-1">Server Address</p>
                <code class="text-lg text-blue-100 font-mono">43.156.164.5:7010</code>
            </div>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase text-slate-500 mb-1.5 ml-1">Karakter IC (Format: Nama_Belakang)</label>
                <input type="text" id="charName" 
                    class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all placeholder:text-slate-600"
                    placeholder="Contoh: Robert_Manuel">
            </div>

            <button onclick="submitData()" id="btnSubmit"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-900/20 active:scale-[0.98]">
                Daftarkan Sekarang
            </button>
        </div>

        <div id="status" class="mt-6 text-center text-sm font-medium min-h-[20px]"></div>

        <div class="mt-8 pt-6 border-t border-slate-800 text-center">
            <p class="text-slate-500 text-xs">© 2026 SAMP Roleplay Community</p>
        </div>
    </div>

    <script>
        async function submitData() {
            const charNameInput = document.getElementById('charName');
            const btn = document.getElementById('btnSubmit');
            const statusDiv = document.getElementById('status');
            
            const char_name = charNameInput.value.trim();

            if (!char_name.includes("_")) {
                statusDiv.className = "mt-6 text-center text-sm text-red-400";
                statusDiv.innerText = "Gunakan format Nama_Belakang!";
                return;
            }

            // Loading state
            btn.disabled = true;
            btn.innerText = "Memproses...";
            statusDiv.className = "mt-6 text-center text-sm text-blue-400 animate-pulse";
            statusDiv.innerText = "Menghubungkan ke server...";

            try {
                const response = await fetch('/api/whitelist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'package/json' },
                    body: JSON.stringify({ char_name })
                });
                
                const data = await response.json();

                if (response.ok) {
                    statusDiv.className = "mt-6 text-center text-sm text-green-400";
                    charNameInput.value = "";
                } else {
                    statusDiv.className = "mt-6 text-center text-sm text-red-400";
                }
                statusDiv.innerText = data.message;
            } catch (err) {
                statusDiv.className = "mt-6 text-center text-sm text-red-400";
                statusDiv.innerText = "Terjadi kesalahan koneksi ke API.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Daftarkan Sekarang";
            }
        }
    </script>

</body>
</html>
